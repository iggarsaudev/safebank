<div
  class="min-h-screen bg-gray-50 dark:bg-gray-900 p-6 text-gray-900 dark:text-gray-100"
>
  <header
    class="max-w-6xl mx-auto flex justify-between items-center border-b border-gray-200 dark:border-gray-700 pb-4 mb-8"
  >
    <div class="flex items-center space-x-2">
      <span class="text-2xl font-bold text-indigo-600 dark:text-indigo-400"
        >SafeBank</span
      >
      <span
        class="text-xs bg-indigo-100 text-indigo-800 dark:bg-indigo-900 dark:text-indigo-300 font-semibold px-2.5 py-0.5 rounded"
        >Banca Local</span
      >
    </div>

    <button
      (click)="logout()"
      class="text-sm bg-gray-200 hover:bg-gray-300 dark:bg-gray-800 dark:hover:bg-gray-700 font-medium px-4 py-2 rounded-md transition-colors"
    >
      Cerrar Sesión
    </button>
  </header>

  <main class="max-w-6xl mx-auto">
    @if (isLoading()) {
      <div class="animate-pulse space-y-4 max-w-md">
        <div class="h-6 bg-gray-300 dark:bg-gray-700 rounded w-1/3"></div>
        <div class="h-32 bg-gray-300 dark:bg-gray-700 rounded-lg"></div>
      </div>
    } @else {
      @if (accountData(); as account) {
        <div class="space-y-6">
          <div>
            <h1 class="text-2xl font-bold tracking-tight">Mis Cuentas</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400">
              Resumen global de tus activos financieros actuales.
            </p>
          </div>

          <div
            class="max-w-md bg-white dark:bg-gray-800 rounded-xl shadow-md p-6 border border-gray-100 dark:border-gray-700"
          >
            <div class="flex justify-between items-start mb-4">
              <div>
                <p
                  class="text-xs font-semibold uppercase tracking-wider text-gray-400"
                >
                  Cuenta Corriente Estándar
                </p>
                <p
                  class="text-sm font-mono mt-1 text-gray-700 dark:text-gray-300"
                >
                  {{ account.iban }}
                </p>
              </div>
              <span
                class="text-xs bg-emerald-100 text-emerald-800 dark:bg-emerald-950 dark:text-emerald-300 font-medium px-2 py-0.5 rounded"
                >Activa</span
              >
            </div>

            <div class="mt-8">
              <p
                class="text-xs text-gray-400 uppercase tracking-wider font-semibold"
              >
                Saldo Disponible
              </p>
              <p
                class="text-4xl font-extrabold tracking-tight mt-1 text-indigo-600 dark:text-indigo-400"
              >
                {{ account.balance | currency: "EUR" : "symbol" : "1.2-2" }}
              </p>
            </div>
          </div>
        </div>
      }
    }
  </main>
</div>
