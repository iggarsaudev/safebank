<div
  class="min-h-screen bg-gray-50 dark:bg-gray-900 flex flex-col justify-center py-12 sm:px-6 lg:px-8 transition-colors"
>
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2
      class="mt-6 text-center text-3xl font-extrabold text-gray-900 dark:text-white"
    >
      Nueva Transferencia
    </h2>
    <p class="mt-2 text-center text-sm text-gray-600 dark:text-gray-400">
      Envía dinero de forma rápida y segura
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div
      class="bg-white dark:bg-gray-800 py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-gray-100 dark:border-gray-700"
    >
      <form
        [formGroup]="transferForm"
        (ngSubmit)="onSubmit()"
        class="space-y-6"
      >
        @if (beneficiaries().length > 0) {
          <div>
            <label
              for="agenda"
              class="block text-sm font-medium text-gray-700 dark:text-gray-300"
              >Seleccionar de tu Agenda</label
            >
            <select
              id="agenda"
              (change)="onBeneficiarySelect($event)"
              class="mt-1 block w-full pl-3 pr-10 py-2 text-base border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md dark:bg-gray-700 dark:text-white transition-colors"
            >
              <option value="">-- Elige un contacto (Opcional) --</option>
              @for (contact of beneficiaries(); track contact.id) {
                <option [value]="contact.iban">{{ contact.name }}</option>
              }
            </select>
          </div>

          <div class="relative flex items-center py-1">
            <div
              class="flex-grow border-t border-gray-300 dark:border-gray-700"
            ></div>
            <span
              class="flex-shrink-0 mx-4 text-gray-400 text-xs uppercase tracking-wider"
              >o escribe un IBAN a mano</span
            >
            <div
              class="flex-grow border-t border-gray-300 dark:border-gray-700"
            ></div>
          </div>
        }

        <div>
          <label
            for="targetIban"
            class="block text-sm font-medium text-gray-700 dark:text-gray-300"
            >IBAN de destino</label
          >
          <div class="mt-1">
            <input
              id="targetIban"
              type="text"
              formControlName="targetIban"
              placeholder="ES00..."
              class="appearance-none block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm dark:bg-gray-700 dark:text-white transition-colors uppercase"
            />
          </div>
        </div>

        <div>
          <label
            for="amount"
            class="block text-sm font-medium text-gray-700 dark:text-gray-300"
            >Importe (€)</label
          >
          <div class="mt-1">
            <input
              id="amount"
              type="number"
              step="0.01"
              formControlName="amount"
              placeholder="0.00"
              class="appearance-none block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm dark:bg-gray-700 dark:text-white transition-colors"
            />
          </div>
        </div>

        <div>
          <label
            for="concept"
            class="block text-sm font-medium text-gray-700 dark:text-gray-300"
            >Concepto (Opcional)</label
          >
          <div class="mt-1">
            <input
              id="concept"
              type="text"
              formControlName="concept"
              placeholder="Ej. Alquiler enero"
              class="appearance-none block w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm dark:bg-gray-700 dark:text-white transition-colors"
            />
          </div>
        </div>

        <div class="flex gap-4 pt-2">
          <button
            type="button"
            routerLink="/dashboard"
            class="w-full flex justify-center py-2 px-4 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors"
          >
            Cancelar
          </button>

          <button
            type="submit"
            [disabled]="transferForm.invalid || isSubmitting"
            class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
          >
            {{ isSubmitting ? "Procesando..." : "Enviar Dinero" }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
