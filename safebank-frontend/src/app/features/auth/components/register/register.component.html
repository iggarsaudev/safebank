<div class="min-h-screen flex items-center justify-center p-4">
  <div
    class="max-w-md w-full bg-white dark:bg-gray-800 rounded-lg shadow-md p-8"
  >
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-gray-900 dark:text-gray-100">
        Crea tu Cuenta
      </h2>
      <p class="text-sm text-gray-600 dark:text-gray-400 mt-2">
        Únete a SafeBank hoy mismo
      </p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label
            for="firstName"
            class="block text-sm font-medium text-gray-900 dark:text-gray-100 mb-1"
            >Nombre</label
          >
          <input
            id="firstName"
            type="text"
            formControlName="firstName"
            class="w-full px-4 py-2 rounded-md border border-gray-300 dark:border-gray-600 bg-surface-light dark:bg-gray-900 focus:ring-2 focus:ring-indigo-600 outline-none transition-colors"
          />
        </div>
        <div>
          <label
            for="lastName"
            class="block text-sm font-medium text-gray-900 dark:text-gray-100 mb-1"
            >Apellido</label
          >
          <input
            id="lastName"
            type="text"
            formControlName="lastName"
            class="w-full px-4 py-2 rounded-md border border-gray-300 dark:border-gray-600 bg-surface-light dark:bg-gray-900 focus:ring-2 focus:ring-indigo-600 outline-none transition-colors"
          />
        </div>
      </div>

      <div>
        <label
          for="email"
          class="block text-sm font-medium text-gray-900 dark:text-gray-100 mb-1"
          >Correo Electrónico</label
        >
        <input
          id="email"
          type="email"
          formControlName="email"
          class="w-full px-4 py-2 rounded-md border border-gray-300 dark:border-gray-600 bg-surface-light dark:bg-gray-900 focus:ring-2 focus:ring-indigo-600 outline-none transition-colors"
        />
      </div>

      <div>
        <label
          for="password"
          class="block text-sm font-medium text-gray-900 dark:text-gray-100 mb-1"
          >Contraseña (Mín. 6 chars)</label
        >
        <input
          id="password"
          type="password"
          formControlName="password"
          class="w-full px-4 py-2 rounded-md border border-gray-300 dark:border-gray-600 bg-surface-light dark:bg-gray-900 focus:ring-2 focus:ring-indigo-600 outline-none transition-colors"
        />
      </div>

      <button
        type="submit"
        [disabled]="registerForm.invalid"
        class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-medium py-2 px-4 rounded-md transition-colors mt-4"
      >
        Crear Cuenta
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-600 dark:text-gray-400">
      ¿Ya tienes cuenta?
      <a
        routerLink="/login"
        class="font-medium text-indigo-600 hover:text-indigo-700 transition-colors"
      >
        Inicia sesión
      </a>
    </p>
  </div>
</div>
