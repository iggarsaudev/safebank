<div class="min-h-screen flex items-center justify-center p-4">
  <div
    class="max-w-md w-full bg-white dark:bg-gray-800 rounded-lg shadow-md p-8"
  >
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-gray-900 dark:text-gray-100">
        Bienvenido a SafeBank
      </h2>
      <p class="text-sm text-gray-600 dark:text-gray-400 mt-2">
        Inicia sesión para acceder a tus cuentas
      </p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label
          for="email"
          class="block text-sm font-medium text-gray-900 dark:text-gray-100 mb-1"
        >
          Correo Electrónico
        </label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="w-full px-4 py-2 rounded-md border border-gray-300 dark:border-gray-600 bg-surface-light dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-indigo-600 outline-none transition-colors"
          placeholder="tu@correo.com"
        />
        @if (
          loginForm.get("email")?.invalid && loginForm.get("email")?.touched
        ) {
          <p class="text-red-500 text-xs mt-1">
            por favor, introduce un correo válido.
          </p>
        }
      </div>

      <div>
        <label
          for="password"
          class="block text-sm font-medium text-gray-900 dark:text-gray-100 mb-1"
        >
          Contraseña
        </label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="w-full px-4 py-2 rounded-md border border-gray-300 dark:border-gray-600 bg-surface-light dark:bg-gray-900 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-indigo-600 outline-none transition-colors"
          placeholder="••••••••"
        />
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid"
        class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-medium py-2 px-4 rounded-md transition-colors"
      >
        Entrar
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-600 dark:text-gray-400">
      ¿No tienes cuenta?
      <a
        routerLink="/register"
        class="font-medium text-indigo-600 hover:text-indigo-700 dark:hover:text-indigo-400 transition-colors"
      >
        Regístrate aquí
      </a>
    </p>
  </div>
</div>
