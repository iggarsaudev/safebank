@if (toastService.toastState().visible) {
  <div
    class="fixed top-4 right-4 z-50 animate-fade-in-down transition-all duration-300"
  >
    <div
      class="flex items-center p-4 mb-4 text-sm rounded-lg shadow-lg"
      [ngClass]="{
        'text-green-800 bg-green-50 dark:bg-gray-800 dark:text-green-400':
          toastService.toastState().type === 'success',
        'text-red-800 bg-red-50 dark:bg-gray-800 dark:text-red-400':
          toastService.toastState().type === 'error',
        'text-indigo-800 bg-indigo-50 dark:bg-gray-800 dark:text-indigo-400':
          toastService.toastState().type === 'info',
      }"
      role="alert"
    >
      <span class="font-medium mr-2">
        @if (toastService.toastState().type === "success") {
          ✓
        }
        @if (toastService.toastState().type === "error") {
          ⚠
        }
      </span>
      <span>{{ toastService.toastState().message }}</span>

      <button
        type="button"
        (click)="toastService.hide()"
        class="ml-4 -mx-1.5 -my-1.5 rounded-lg focus:ring-2 p-1.5 inline-flex h-8 w-8 hover:bg-black/10 transition-colors"
      >
        <span class="sr-only">cerrar</span>
        ✕
      </button>
    </div>
  </div>
}
