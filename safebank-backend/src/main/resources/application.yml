spring:
  datasource:
    # usamos localhost por ahora, pero lo preparamos para variables de entorno
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:safebank_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      # actualiza el esquema automáticamente en desarrollo
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
